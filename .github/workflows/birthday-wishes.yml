name: Send Daily Birthday Wishes

on:
  schedule:
    - cron: '0 8 * * *'  # 8:00 AM UTC every day
  workflow_dispatch:    # Allow manual triggering for testing

env:
  TZ: Europe/Oslo

jobs:
  send-birthday-wishes:
    runs-on: ubuntu-latest
    
    steps:
      - name: Send birthday wishes
        run: |
          HTTP_CODE=000
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.PRODUCTION_URL }}/api/email/send-daily-birthday-wishes")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          # Check if the request was successful
          if echo "$BODY" | grep -q '"success":true'; then
            echo "✅ Birthday wishes sent successfully"
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "❌ Could not reach server. Check PRODUCTION_URL secret."
            exit 1
          else
            echo "❌ Request failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Log results
        if: always()
        run: |
          echo "Birthday wish process completed at $(date)"
